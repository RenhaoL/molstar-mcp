<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mol* MCP viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/molstar@latest/build/viewer/molstar.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/molstar@latest/build/viewer/molstar.css" />
  <style>
    #controls {
      position: absolute;
      bottom: 10px;
      right: 10px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }
    #controls button {
      padding: 6px 12px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    #controls button:hover { background: rgba(0,0,0,0.85); }
    #record-indicator {
      display: none;
      padding: 4px 10px;
      background: rgba(200,0,0,0.75);
      color: white;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body style="margin:0">
  <div id="app" style="position:absolute; inset:0;"></div>
  <div id="controls">
    <button id="btn-screenshot">Save Image</button>
    <button id="btn-record">Record 5s Video</button>
    <div id="record-indicator">● Recording…</div>
  </div>
  <div id="status-bar" style="
    position:absolute; top:10px; left:10px; z-index:10;
    background:rgba(0,0,0,0.65); color:#eee; font-size:12px;
    padding:4px 10px; border-radius:4px; font-family:monospace;
    pointer-events:none;">
    Initialising…
  </div>
  <script>
    const { MVSData, loadMVS } = molstar.PluginExtensions.mvs;
    const statusBar = document.getElementById('status-bar');
    function setStatus(msg) { statusBar.textContent = msg; }

    molstar.Viewer
      .create('app', {
        layoutIsExpanded: false,
        layoutShowControls: false,
        canvas3dContext: { webgl: { preserveDrawingBuffer: true } },
      })
      .then(viewer => {
        setStatus('Viewer ready — waiting for connection');

        // ── Screenshot ──────────────────────────────────────────────────
        function doScreenshot() {
          const canvas = viewer.plugin.canvas3d?.webgl?.gl?.canvas;
          if (!canvas) { console.warn('canvas not ready'); return; }
          canvas.toBlob(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'molstar-view.png';
            a.click();
            URL.revokeObjectURL(url);
          });
        }
        document.getElementById('btn-screenshot').addEventListener('click', doScreenshot);

        // ── Video recording ─────────────────────────────────────────────
        let mediaRecorder = null;

        function doRecord(durationMs) {
          if (mediaRecorder) return;
          const canvas = viewer.plugin.canvas3d?.webgl?.gl?.canvas;
          if (!canvas) { console.warn('canvas not ready'); return; }

          const stream = canvas.captureStream(30);
          const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
            ? 'video/webm;codecs=vp9' : 'video/webm';
          mediaRecorder = new MediaRecorder(stream, { mimeType });
          const chunks = [];

          mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'molstar-movie.webm';
            a.click();
            URL.revokeObjectURL(url);
            mediaRecorder = null;
            document.getElementById('record-indicator').style.display = 'none';
          };

          mediaRecorder.start(100);
          document.getElementById('record-indicator').style.display = 'block';
          setTimeout(() => mediaRecorder?.stop(), durationMs);
        }
        document.getElementById('btn-record').addEventListener('click', () => doRecord(5000));

        // ── Spin ────────────────────────────────────────────────────────
        let spinRafId = null;

        function setSpin(on) {
          const canvas3d = viewer.plugin.canvas3d;
          if (!canvas3d) return;
          try {
            const tb = JSON.parse(JSON.stringify(canvas3d.props.trackball ?? {}));
            tb.animate = on
              ? { name: 'spin', params: { speed: 1 } }
              : { name: 'off', params: {} };
            canvas3d.setProps({ trackball: tb });
          } catch (e) {
            console.warn('trackball spin failed, using rAF fallback:', e);
            if (on) {
              if (spinRafId) return;
              const plugin = viewer.plugin;
              function step() {
                const cam = plugin.canvas3d?.camera;
                if (cam) {
                  const angle = 0.005;
                  const { position, target, up } = cam.state;
                  const dx = position[0] - target[0], dz = position[2] - target[2];
                  const cos = Math.cos(angle), sin = Math.sin(angle);
                  cam.setState({
                    position: [target[0] + dx*cos - dz*sin, position[1], target[2] + dx*sin + dz*cos],
                    up, target,
                  });
                }
                spinRafId = requestAnimationFrame(step);
              }
              spinRafId = requestAnimationFrame(step);
            } else {
              if (spinRafId) { cancelAnimationFrame(spinRafId); spinRafId = null; }
            }
          }
        }

        // ── Download helpers ────────────────────────────────────────────
        function downloadUrl(url, filename) {
          fetch(url).then(r => r.blob()).then(blob => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
          }).catch(e => console.error('download failed:', e));
        }

        function downloadText(content, filename) {
          const blob = new Blob([content], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          a.click();
        }

        // ── Scene queue ─────────────────────────────────────────────────
        // Problem: loadMVS takes 2-5s (downloads the CIF). If a second scene
        // arrives while the first is still loading (e.g. hide_chain right after
        // load_protein), two concurrent loadMVS calls corrupt the viewer state.
        //
        // Fix — two-layer protection:
        //   1. Debounce (400ms): batch rapid consecutive messages (e.g. the
        //      empty-clear + real-structure pair from load_protein) into one call.
        //   2. Serialize: if loadMVS is already running when the next scene fires,
        //      hold it until the current load finishes, then apply the latest.
        let isApplying = false;
        let latestRaw = null;
        let debounceTimer = null;

        async function applyScene(raw) {
          isApplying = true;
          latestRaw = null;
          setStatus('Loading scene…');
          try {
            const scene = MVSData.fromMVSJ(raw);
            setStatus('Fetching structure from PDB…');
            await loadMVS(viewer.plugin, scene, { replaceExisting: true });
            setStatus('Ready ✓');
          } catch (e) {
            setStatus('Error: ' + e.message);
            console.error('[molstar-mcp] loadMVS error:', e);
          }
          isApplying = false;
          // If a newer scene arrived while we were loading, apply it now.
          if (latestRaw) {
            const next = latestRaw;
            latestRaw = null;
            await applyScene(next);
          }
        }

        function scheduleScene(raw) {
          latestRaw = raw;
          if (isApplying) return; // applyScene will pick up latestRaw when done
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(() => {
            const data = latestRaw;
            latestRaw = null;
            if (data) applyScene(data);
          }, 400);
        }

        function connect() {
          const ws = new WebSocket('ws://localhost:8765');
          ws.onopen = () => { console.log('[molstar-mcp] connected'); setStatus('Connected — waiting for structure'); };
          ws.onclose = () => { console.log('[molstar-mcp] disconnected, retrying in 2s…'); setStatus('Disconnected — retrying…'); setTimeout(connect, 2000); };
          ws.onerror = e => console.error('[molstar-mcp] ws error', e);

          ws.onmessage = (msg) => {
            let data;
            try { data = JSON.parse(msg.data); } catch { return; }

            if (data.type === 'control') {
              switch (data.action) {
                case 'spin_start':    setSpin(true);  break;
                case 'spin_stop':     setSpin(false); break;
                case 'screenshot':    doScreenshot(); break;
                case 'record_start':  doRecord(data.duration_ms ?? 5000); break;
                case 'download_file': downloadUrl(data.url, data.filename); break;
                case 'download_text': downloadText(data.content, data.filename); break;
              }
            } else {
              scheduleScene(msg.data);
            }
          };
        }

        connect();
      });
  </script>
</body>
</html>
